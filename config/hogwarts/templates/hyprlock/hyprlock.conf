# ============================================================================
#  hyprlock.conf — Hogwarts themed lockscreen (GENERATED — see palettes.conf)
#  A parchment-style lock: blurred wallpaper, Cinzel clock, house accent ring.
# ============================================================================
background {
    monitor =
    path = {{WALL_PATH}}
    blur_passes = 2
    blur_size = 6
    color = rgba({{BG#ff}})
}

general {
    hide_cursor = true
    grace = 3
    ignore_empty_input = true
}

# House accent ring + sigil (Material Symbols), top-centre.
label {
    monitor =
    text = 󰊴
    color = rgba({{ACCENT2#ff}})
    font_size = 64
    font_family = Material Symbols Outlined
    position = 0, 240
    halign = center
    valign = center
}

# Big Cinzel clock.
label {
    monitor =
    text = $TIME
    color = rgba({{TEXT#ff}})
    font_size = 110
    font_family = Cinzel
    position = 0, 100
    halign = center
    valign = center
}

# Date beneath the clock.
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %e %B  ·  %Y"
    color = rgba({{TEXT_DIM#ff}})
    font_size = 26
    font_family = EB Garamond
    position = 0, 20
    halign = center
    valign = center
}

# House name, italic.
label {
    monitor =
    text = {{HOUSE_TITLE}}
    color = rgba({{ACCENT#ff}})
    font_size = 22
    font_family = Cinzel
    position = 0, -30
    halign = center
    valign = center
}

# Password prompt.
input-field {
    monitor =
    size = 420, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.35
    dots_center = true
    inner_color = rgba({{SURFACE#cc}})
    outer_color = rgba({{ACCENT#cc}})
    font_color = rgba({{TEXT#ff}})
    fade_on_empty = true
    placeholder_text = <i>Reveal your spell…</i>
    hide_input = false
    position = 0, -160
    halign = center
    valign = center
}
