# ============================================================================
#  kitty.conf  —  Hogwarts Rice (GENERATED — do not edit; see palettes.conf)
# ----------------------------------------------------------------------------
#  The terminal of choice.  Background is transparent (compositor supplies the
#  blur via a Hyprland window rule) and cursor-line tracing is explicitly
#  disabled per the design constraint.
# ============================================================================

# --- Fonts -------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
modify_font      cell_height 105%

# Disable ligatures for clarity in code.
disable_ligatures cursor

# --- Transparency ------------------------------------------------------------
# Transparent background — Hyprland blur on the kitty window gives the glass
# effect.  dynamic_background_opacity lets SUPER+mouse scroll adjust it live.
background_opacity         0.82
dynamic_background_opacity yes
background_tint            0.0

# --- Cursor (line tracing explicitly OFF) ------------------------------------
# kitty's "cursor_trail" leaves a fading trail behind the beam cursor.  The
# brief demands this be disabled, so we force it off (and zero its decay).
cursor_shape            beam
cursor_shape_unfocused  hollow
cursor_blink_interval   0.5
cursor_trail            0
cursor_trail_decay      0.0 0.0
cursor_beam_thickness   1.6

# --- Scrolling / bell --------------------------------------------------------
scrollback_lines 10000
enable_audio_bell no
visual_bell_duration 0.0

# --- Window / layout ---------------------------------------------------------
remember_window_size  no
initial_window_width  1100
initial_window_height 700
window_padding_width  10 14
window_margin_width   0
inactive_text_alpha    0.85
placement_strategy     center
hide_window_decorations yes

# --- Shell / misc ------------------------------------------------------------
shell_integration enabled
copy_on_select   clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# New tabs/windows open in the current working directory.
map kitty_mod+t new_tab_with_cwd
map kitty_mod+enter new_window_with_cwd
map kitty_mod+q close_window

# Live opacity control.
map kitty_mod+up   increase_background_opacity
map kitty_mod+down decrease_background_opacity

# ============================================================================
#  Hogwarts palette colours
# ============================================================================
foreground              {{TEXT}}
background              {{BG}}
selection_foreground    {{SELECTION_FG}}
selection_background    {{SELECTION_BG}}

cursor                  {{ACCENT}}
cursor_text_color       {{BG}}

url_color               {{ACCENT2}}

# black
color0  {{BG}}
color8  {{BORDER}}
# red
color1  {{URGENT}}
color9  {{URGENT}}
# green
color2  {{SUCCESS}}
color10 {{SUCCESS}}
# yellow
color3  {{WARNING}}
color11 {{WARNING}}
# blue
color4  {{ACCENT}}
color12 {{ACCENT}}
# magenta
color5  {{ACCENT2}}
color13 {{ACCENT2}}
# cyan
color6  {{ACCENT2}}
color14 {{ACCENT2}}
# white
color7  {{TEXT}}
color15 {{TEXT_DIM}}

# Tab bar
active_tab_foreground   {{ACCENT_FG}}
active_tab_background   {{ACCENT}}
active_tab_font_style   bold
inactive_tab_foreground {{TEXT_DIM}}
inactive_tab_background {{SURFACE}}
inactive_tab_font_style normal
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      {fmt.fg.red}{{BG}}{fmt.fg.tab}{title}
active_tab_title_template {fmt.fg.default}{fmt.bg.tab}{title}

# --- Extras ------------------------------------------------------------------
include hogwarts-local.conf 2>/dev/null
