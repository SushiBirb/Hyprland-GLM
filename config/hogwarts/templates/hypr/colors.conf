# ============================================================================
#  colors.conf — Hyprland palette bindings (GENERATED — see palettes.conf)
#  Sourced by hyprland.conf.  Window borders + gaps tint follow the house.
#  Hyprland colours use rgba(rrggbbaa); the KEY+hex-alpha syntax yields hex8.
# ============================================================================
general {
    col.active_border   = rgba({{ACCENT#cc}})
    col.inactive_border = rgba({{BORDER_DIM#aa}})
}

decoration {
    col.shadow = rgba({{SHADOW#aa}})
}

misc {
    background_color = rgba({{BG#ff}})
}

# Pinned windows get a brighter accent ring.
windowrulev2 = bordercolor rgba({{ACCENT#ff}}) rgba({{ACCENT2#cc}}),pinned:1
