# ============================================================================
#  Hogwarts Rice — Master Palette File
# ----------------------------------------------------------------------------
#  Single source of truth for all 8 Hogwarts house themes.
#  Inspired by linux-antiquity's centralized `themes` dictionary.
#
#  Every app config (kitty / waybar / rofi / dunst / hyprland / hyprpaper /
#  zen-browser) is rendered from these keys via templates/hogwarts/scripts/
#  apply-theme.sh using {{KEY}} placeholders.
#
#  Semantic keys (shared by every theme):
#    BG            deepest background / lightest parchment
#    BG_ALT        secondary background for depth
#    SURFACE       floating panels & cards
#    SURFACE_ALT   alternate panel (hover)
#    SURFACE_HIGH  raised surface (active/urgent)
#    TEXT          primary text (ink)
#    TEXT_DIM      secondary text
#    TEXT_MUTE     faint / placeholder text
#    ACCENT        primary house colour
#    ACCENT2       secondary house colour
#    ACCENT_FG     text drawn on top of ACCENT
#    ACCENT2_FG    text drawn on top of ACCENT2
#    BORDER        hairline outline (antiquity "inked engraving" look)
#    BORDER_DIM    faint outline
#    URGENT        notifications / critical
#    WARNING       warnings
#    SUCCESS       success / ok
#    SELECTION_BG  selected-item background
#    SELECTION_FG  selected-item text
#    SHADOW        drop shadow colour
#    GLASS         warm tint for translucent glass panels
#    WALLPAPER     wallpaper file in assets/wallpapers/
# ============================================================================

# ---------------------------------------------------------------------------
