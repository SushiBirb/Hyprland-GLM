# ============================================================================
#  rules.conf — window & layer rules
#  Layer namespaces get blur (the "stained glass" effect from linux-antiquity).
# ============================================================================

# --- Blur the shell layers ----------------------------------------------------
layerrule = blur, waybar
layerrule = ignorealpha 0.5, waybar
layerrule = blur, rofi
layerrule = ignorealpha 0.4, rofi
layerrule = blur, dunst
layerrule = ignorealpha 0.5, dunst
layerrule = blur, gtk-layer-shell
layerrule = ignorealpha 0.5, gtk-layer-shell
layerrule = blur, launcher
layerrule = ignorealpha 0.4, launcher

# No animations on these transient layers.
layerrule = noanim, selection
layerrule = noanim, hyprpicker

# --- Kitty: transparent so the compositor blur shows through -----------------
windowrulev2 = opacity 0.82, class:^(kitty)$
windowrulev2 = blur on,  class:^(kitty)$

# Zen browser: subtle transparency so the wallpaper hints through.
windowrulev2 = opacity 0.96, class:^(zen-browser)$

# Float + center common utilities.
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$

# No shadow on tiled windows (cleaner look), keep shadow on floating.
windowrulev2 = noshadow, floating:0

# Dolphin / dialogs: a touch of rounding handled globally.

# Screenshots / slurp selection should not be blurred or animated.
windowrulev2 = noanim,  class:^(slurp)$
windowrulev2 = noanim,  class:^(grim)$

# Default apps.
windowrulev2 = workspace 1, class:^(zen-browser)$
windowrulev2 = workspace 2, class:^(kitty)$
windowrulev2 = workspace 3, class:^(dolphin)$
