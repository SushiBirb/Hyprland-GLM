# ============================================================================
#  Hogwarts Rice — Hyprland master config
#  Sources modular fragments.  Defaults live in hyprland/; user overrides in
#  custom/.  Colors + animation preset are GENERATED by apply-theme.sh.
# ============================================================================

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/execs.conf
source = ~/.config/hypr/general.conf
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/active-animations.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/custom-keybinds.conf

# --- User overrides (created on demand, never overwritten by updates) -------
source = ~/.config/hypr/custom/env.conf        # optional
source = ~/.config/hypr/custom/general.conf    # optional
source = ~/.config/hypr/custom/rules.conf      # optional
