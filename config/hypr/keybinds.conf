# ============================================================================
#  keybinds.conf — Hogwarts keybindings
#  Grammar for the keybinds viewer (SUPER+/):
#    ##! Section title     -> grouped heading in the viewer
#    # [hidden]            -> suppress a bind from the viewer
# ============================================================================

##! Essentials
# Launch the terminal (Kitty)
bind = SUPER, T, exec, kitty
# Close the active window (Alt+F4 equivalent)
bind = SUPER, Q, killactive
# Launch the application launcher (Rofi)
bindr= SUPER, Super_L, exec, ~/.config/rofi/scripts/launcher.sh
# Launch the file explorer (Dolphin)
bind = SUPER, E, exec, dolphin
# Show all current keybindings
bind = SUPER, Slash, exec, ~/.config/rofi/scripts/keybinds.sh

##! Session & System
# Power / session menu
bind = CTRL+ALT, Delete, exec, ~/.config/rofi/scripts/power.sh
# Open the Hogwarts settings menu (illogical-impulse-style GTK panel)
bind = SUPER+SHIFT, S, exec, ~/.config/hogwarts/scripts/settings-panel.py
# Lock the session
bind = SUPER+ALT, L, exec, loginctl lock-session
# Reload Hyprland config
bind = SUPER+SHIFT, R, forcerendererreload
# Exit Hyprland
bind = SUPER+SHIFT, Q, exit

##! Window management
# Toggle floating
bind = SUPER, F, togglefloating
# Toggle fullscreen
bind = SUPER, Space, fullscreen, 0
# Pin window (always on top)
bind = SUPER+CTRL, P, pin
# Move focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
# Swap windows
bind = SUPER+SHIFT, left, swapwindow, l
bind = SUPER+SHIFT, right, swapwindow, r
bind = SUPER+SHIFT, up, swapwindow, u
bind = SUPER+SHIFT, down, swapwindow, d
# Cycle focus
bind = ALT, Tab, cyclenext
bind = ALT+SHIFT, Tab, cyclenext, prev
# Resize with the mouse (SUPER + right-drag)
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

##! Workspace navigation
# Switch to workspace 1
bind = SUPER, 1, workspace, 1
# Switch to workspace 2
bind = SUPER, 2, workspace, 2
# Switch to workspace 3
bind = SUPER, 3, workspace, 3
# Switch to workspace 4
bind = SUPER, 4, workspace, 4
# Switch to workspace 5
bind = SUPER, 5, workspace, 5
# Switch to workspace 6
bind = SUPER, 6, workspace, 6
# Switch to workspace 7
bind = SUPER, 7, workspace, 7
# Switch to workspace 8
bind = SUPER, 8, workspace, 8
# Switch to workspace 9
bind = SUPER, 9, workspace, 9
# Previous / next workspace
bind = SUPER, Tab, workspace, previous
# Scroll through workspaces
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
# Special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace

##! Workspace management
# Silently move window to workspace 1
bind = SUPER+ALT, 1, movetoworkspacesilent, 1
# Silently move window to workspace 2
bind = SUPER+ALT, 2, movetoworkspacesilent, 2
# Silently move window to workspace 3
bind = SUPER+ALT, 3, movetoworkspacesilent, 3
# Silently move window to workspace 4
bind = SUPER+ALT, 4, movetoworkspacesilent, 4
# Silently move window to workspace 5
bind = SUPER+ALT, 5, movetoworkspacesilent, 5
# Silently move window to workspace 6
bind = SUPER+ALT, 6, movetoworkspacesilent, 6
# Silently move window to workspace 7
bind = SUPER+ALT, 7, movetoworkspacesilent, 7
# Silently move window to workspace 8
bind = SUPER+ALT, 8, movetoworkspacesilent, 8
# Silently move window to workspace 9
bind = SUPER+ALT, 9, movetoworkspacesilent, 9
# Move window to workspace 1 and follow
bind = SUPER+SHIFT, 1, movetoworkspace, 1
# Move window to workspace 2 and follow
bind = SUPER+SHIFT, 2, movetoworkspace, 2
# Move window to workspace 3 and follow
bind = SUPER+SHIFT, 3, movetoworkspace, 3
# Move window to workspace 4 and follow
bind = SUPER+SHIFT, 4, movetoworkspace, 4
# Move window to workspace 5 and follow
bind = SUPER+SHIFT, 5, movetoworkspace, 5
# Move window to workspace 6 and follow
bind = SUPER+SHIFT, 6, movetoworkspace, 6
# Move window to workspace 7 and follow
bind = SUPER+SHIFT, 7, movetoworkspace, 7
# Move window to workspace 8 and follow
bind = SUPER+SHIFT, 8, movetoworkspace, 8
# Move window to workspace 9 and follow
bind = SUPER+SHIFT, 9, movetoworkspace, 9

##! Actions
# Screenshot a region to clipboard + file
bind = SUPER+SHIFT, X, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png | wl-copy
# Screenshot the whole screen
bind = SUPER+ALT, X, exec, grim - | tee ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png | wl-copy
# Pick a colour from the screen
bind = SUPER+ALT, C, exec, hyprpicker -a
# Clipboard history
bind = SUPER, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/menu.rasi -p Clipboard | cliphist decode | wl-copy
# Emoji picker
bind = SUPER+ALT, E, exec, ~/.config/rofi/scripts/emoji.sh

##! Media & Hardware
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bindl =, XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl =, XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindle=, XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindle=, XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl =, XF86AudioPlay,  exec, playerctl play-pause
bindl =, XF86AudioNext,  exec, playerctl next
bindl =, XF86AudioPrev,  exec, playerctl previous
