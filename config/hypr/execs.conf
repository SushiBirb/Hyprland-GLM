# ============================================================================
#  execs.conf — autostart (exec-once)
# ============================================================================
# Daemons first.  (swww / awww wallpaper daemon — whichever is installed.)
exec-once = sh -c 'command -v swww-daemon >/dev/null && exec swww-daemon --format xrgb; command -v awww-daemon >/dev/null && exec awww-daemon --format xrgb'
exec-once = dbus-update-activation-environment --all
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# OSD: a wob FIFO so any writer can pop a progress bar.
exec-once = sh -c 'rm -f /tmp/wob.sock; mkfifo /tmp/wob.sock; tail -f /tmp/wob.sock | wob --anchor bottom --offset 28 --margin 20'

# Idle + lock.
exec-once = hypridle

# Clipboard history.
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Notifications + bar.
exec-once = dunst
exec-once = waybar

# Apply the saved Hogwarts theme (renders every config + sets wallpaper).
exec-once = ~/.config/hogwarts/scripts/apply-theme.sh

# Cursor.
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Portal.
exec-once = systemctl --user start xdg-desktop-portal-hyprland
