# ============================================================================
#  animations-snappy.conf  —  MINIMAL & SNAPPY preset (default)
#  Quick, no-nonsense motion.  Sourced as active-animations.conf when the
#  mode is "snappy".
# ============================================================================
animations {
    enabled = true
    bezier = snappy_out, 0.15, 0.9, 0.25, 1
    bezier = snappy_in,  0.3, 0, 0.6, 1
    animation = windows,       1, 3, snappy_out, popin 80%
    animation = windowsIn,     1, 3, snappy_out, popin 80%
    animation = windowsOut,    1, 2, snappy_in,  popin 80%
    animation = windowsMove,   1, 3, snappy_out
    animation = border,        1, 4, default
    animation = fade,          1, 2, snappy_out
    animation = workspaces,    1, 3, snappy_out, slide
    animation = workspacesIn,  1, 3, snappy_out, slide
    animation = workspacesOut, 1, 2, snappy_in,  slide
    animation = specialWorkspace, 1, 3, snappy_out, slidefadevert 20%
    animation = layers,        0, 0, default
    animation = fadeLayers,    1, 1, default
}
