# ============================================================================
#  animations-whimsy.conf  —  MAGICAL / WHIMSY preset
#  Heavier, bouncy, "enchanted" motion.  Sourced as active-animations.conf
#  when the mode is "whimsy".  Pairs with full blur for a dreamy feel.
# ============================================================================
animations {
    enabled = true
    # Springy, expressive curves.
    bezier = whimsy_bounce,  0.34, 1.56, 0.64, 1
    bezier = whimsy_soft,    0.22, 1, 0.36, 1
    bezier = whimsy_overshoot, 0.05, 0.9, 0.1, 1.25
    bezier = whimsy_float,   0.16, 1, 0.3, 1
    bezier = whimsy_glide,   0.45, 0, 0.15, 1

    animation = windows,       1, 6, whimsy_bounce,   popin 85%
    animation = windowsIn,     1, 6, whimsy_bounce,   popin 85%
    animation = windowsOut,    1, 5, whimsy_float,    popin 80%
    animation = windowsMove,   1, 6, whimsy_overshoot
    animation = border,        1, 8, whimsy_overshoot
    animation = fade,          1, 4, whimsy_soft
    animation = layersIn,      1, 5, whimsy_float,    slide
    animation = layersOut,     1, 4, whimsy_glide
    animation = fadeLayersIn,  1, 4, whimsy_float
    animation = fadeLayersOut, 1, 5, whimsy_glide
    animation = workspaces,    1, 8, whimsy_overshoot, slidefadevert 18%
    animation = workspacesIn,  1, 8, whimsy_overshoot, slidefadevert 18%
    animation = workspacesOut, 1, 6, whimsy_glide,    slidefadevert 18%
    animation = specialWorkspace, 1, 7, whimsy_bounce, slidefadevert 25%
}
