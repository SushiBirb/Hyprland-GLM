# ============================================================================
#  general.conf — gaps, input, decoration, blur, layout, misc
#  (Animations live in active-animations.conf, generated per "mode".)
# ============================================================================

general {
    gaps_in  = 4
    gaps_out = 8
    gaps_workspaces = 0
    border_size = 2
    no_border_on_floating = false
    col.active_border   = rgba(c0392bcc)
    col.inactive_border = rgba(331a2099)
    layout = dwindle
    resize_on_border = true
    hover_icon_on_border = true
    allow_tearing = false
}

# --- Input -------------------------------------------------------------------
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    repeat_rate = 40
    repeat_delay = 300
    numlock_by_default = true
    left_handed = false
    follow_mouse = 1
    float_switch_override_focus = 2
    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        tap-to-click = true
        scroll_factor = 0.9
    }
    sensitivity = 0.0
}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 280
    workspace_swipe_create_new = true
}

# --- Decoration --------------------------------------------------------------
decoration {
    rounding = 14
    active_opacity   = 0.98
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 12
        passes = 3
        brightness = 1.0
        noise = 0.015
        contrast = 1.0
        popups = true
        popups_ignorealpha = 0.6
    }

    drop_shadow = true
    shadow_ignore_window = true
    shadow_range = 18
    shadow_render_power = 3
    shadow_offset = 0 2
    col.shadow = rgba(0a050699)

    dim_inactive = false
    dim_strength = 0.08
}

# --- Layout ------------------------------------------------------------------
dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = slave
    mfact = 0.55
}

# --- Misc --------------------------------------------------------------------
misc {
    vrr = 1
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = ^(kitty|foot|Alacritty)$
    focus_on_activate = true
    initial_workspace_tracking = false
    render_unfocused_fps = 5
}

cursor {
    no_hardware_cursors = false
    sync_gsettings_theme = true
    no_warps = false
}

opengl {
    nvidia_anti_flicker = true
}
